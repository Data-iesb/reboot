name: Deploy to S3

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - run: aws s3 sync . s3://reboot.dataiesb.com --exclude ".git/*" --exclude ".github/*" --delete

      - run: aws cloudfront create-invalidation --distribution-id E5RH1HRTC0A9I --paths "/*"
